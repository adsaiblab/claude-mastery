services:
  claude-mastery:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PUBLIC_ENV: ${PUBLIC_ENV:-production}
        PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
        PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL}
        PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
        PUBLIC_APP_VERSION: ${PUBLIC_APP_VERSION:-0.1.0}
    image: claude-mastery:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4321
      PUBLIC_ENV: ${PUBLIC_ENV:-production}
      PUBLIC_SITE_URL: ${PUBLIC_SITE_URL}
      PUBLIC_SUPABASE_URL: ${PUBLIC_SUPABASE_URL}
      PUBLIC_SUPABASE_ANON_KEY: ${PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      EXPERT_USER_EMAILS: ${EXPERT_USER_EMAILS}
      PUBLIC_APP_VERSION: ${PUBLIC_APP_VERSION:-0.1.0}
    ports:
      - "4321:4321"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:4321/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
